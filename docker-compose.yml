version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: resumeforge-backend
    ports:
      - "8000:8000"
    volumes:
      - resumeforge-data:/app/data
    environment:
      - SECRET_KEY=change-this-in-production
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: resumeforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  resumeforge-data:
